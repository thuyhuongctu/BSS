name: Deploy to GitHub Pages

# Deploy the static single-page app whenever main is updated,
# or on demand via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the workflow the permissions GitHub Pages requires.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repository root is the site (index.html lives here).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
